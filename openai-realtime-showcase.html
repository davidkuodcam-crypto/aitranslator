<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI 語音模型展示戰情室</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .tab-active { border-bottom: 2px solid #818cf8; color: #818cf8; background-color: rgba(79, 70, 229, 0.1); }
        .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
        .tab-inactive:hover { color: #d1d5db; background-color: rgba(31, 41, 55, 0.5); }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 font-sans p-4 md:p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- 頂部設定區 -->
        <div class="bg-gray-800 rounded-2xl shadow-lg border border-gray-700 overflow-hidden">
            <!-- Header -->
            <div class="p-5 border-b border-gray-700 bg-gray-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h1 class="text-2xl font-bold flex items-center gap-2 text-indigo-400">
                    <i data-lucide="cpu" class="w-6 h-6"></i>
                    OpenAI 即時語音模型展示 (Realtime API)
                </h1>
                <div class="flex items-center gap-2 text-sm text-gray-400 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-700">
                    <span id="statusIndicator" class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span id="statusMessage">系統就緒</span>
                </div>
            </div>

            <!-- 全域設定：API Key -->
            <div class="px-5 py-4 bg-gray-800 border-b border-gray-700 flex flex-col md:flex-row items-center gap-4">
                <label class="whitespace-nowrap text-sm font-medium text-gray-400 flex items-center gap-1">
                    <i data-lucide="key" class="w-4 h-4"></i> 全域設定：API Key
                </label>
                <input 
                    type="password" 
                    id="apiKeyInput"
                    placeholder="sk-proj-..."
                    class="w-full md:max-w-md bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-colors disabled:opacity-50"
                />
            </div>

            <!-- 三大功能分頁 Tabs -->
            <div class="flex flex-col md:flex-row bg-gray-800/50 border-b border-gray-700">
                <button onclick="switchTab('assistant')" id="tab-assistant" class="flex-1 py-3 px-4 text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 tab-active">
                    <i data-lucide="bot" class="w-4 h-4"></i> GPT-Realtime-2 (含工具調用)
                </button>
                <button onclick="switchTab('translate')" id="tab-translate" class="flex-1 py-3 px-4 text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 tab-inactive">
                    <i data-lucide="globe" class="w-4 h-4"></i> GPT-Realtime-Translate (即時翻譯)
                </button>
                <button onclick="switchTab('whisper')" id="tab-whisper" class="flex-1 py-3 px-4 text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 tab-inactive">
                    <i data-lucide="mic-2" class="w-4 h-4"></i> GPT-Realtime-Whisper (即時聽寫)
                </button>
            </div>

            <!-- 分頁內容與操作區 -->
            <div class="p-5">
                <!-- 功能解說區 -->
                <div id="explanationContainer" class="mb-6 p-4 bg-indigo-900/20 border border-indigo-500/30 rounded-xl text-indigo-200 text-sm leading-relaxed">
                    <!-- 動態載入解說內容 -->
                </div>

                <div id="errorContainer" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg flex items-start gap-2 text-red-400 text-sm">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                    <span id="errorMessage" class="break-all"></span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                    <div class="md:col-span-8">
                        <label class="block text-sm font-medium text-gray-400 mb-1">功能參數設定</label>
                        <!-- 翻譯語言選擇 -->
                        <select id="targetLanguageSelect" class="hidden w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-colors disabled:opacity-50 appearance-none">
                            <option value="en">翻成：英文 (English)</option>
                            <option value="ja">翻成：日文 (日本語)</option>
                            <option value="vi">翻成：越南文 (Tiếng Việt)</option>
                        </select>
                        <!-- 助理角色選擇 -->
                        <div id="assistantSettings" class="flex gap-2">
                            <select id="assistantRoleSelect" class="w-2/3 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-colors disabled:opacity-50 appearance-none">
                                <option value="招生顧問">角色：文藻外語大學招生顧問</option>
                                <option value="面試官">角色：嚴格的大學面試官</option>
                                <option value="心靈導師">角色：溫柔的心靈導師</option>
                            </select>
                            <select id="voiceSelect" class="w-1/3 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-colors disabled:opacity-50 appearance-none">
                                <option value="alloy">女聲 (Alloy)</option>
                                <option value="echo">男聲 (Echo)</option>
                                <option value="shimmer">柔和女聲 (Shimmer)</option>
                            </select>
                        </div>
                        <!-- 聽寫提示 -->
                        <div id="whisperNotice" class="hidden w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-400 flex items-center gap-2">
                            <i data-lucide="info" class="w-4 h-4"></i> 此模式無參數需設定，系統將進行純轉錄 (無 AI 回應)。
                        </div>
                    </div>
                    <div class="md:col-span-4">
                        <button
                            id="toggleRecordingBtn"
                            class="w-full py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 font-bold transition-all bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg shadow-indigo-600/20"
                        >
                            <i data-lucide="mic" id="btnIcon" class="w-4 h-4"></i> 
                            <span id="btnText">開始連線測試</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 核心佈局：計費與對話區 -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- 左側：計費面板 -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-gray-800 p-5 rounded-2xl shadow-lg border border-gray-700 flex flex-col items-center justify-center relative overflow-hidden">
                    <i data-lucide="clock" class="w-6 h-6 text-gray-500 mb-2"></i>
                    <div id="sessionTimeDisplay" class="text-3xl font-mono font-bold text-white mb-1">00:00</div>
                    <div class="text-xs text-gray-400">本次連線時間</div>
                </div>

                <div class="bg-gray-800 p-5 rounded-2xl shadow-lg border border-gray-700 relative overflow-hidden">
                    <div class="flex justify-between items-start mb-3">
                        <i data-lucide="dollar-sign" class="w-6 h-6 text-green-400"></i>
                        <div class="text-right">
                            <div id="sessionCostDisplay" class="text-2xl font-mono font-bold text-red-400">$0.0000</div>
                            <div class="text-xs text-gray-400 mt-1">本次預估費用</div>
                        </div>
                    </div>
                    
                    <div class="pt-3 border-t border-gray-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs text-gray-400">剩餘預估餘額</span>
                            <span id="remainingBudgetDisplay" class="text-sm font-mono font-bold text-green-500">$5.0000</span>
                        </div>
                        <div class="w-full bg-gray-900 rounded-full h-1.5 mt-2">
                            <div id="budgetProgressBar" class="h-1.5 rounded-full bg-green-500 transition-all duration-1000" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：對話與翻譯區 -->
            <div class="lg:col-span-3 bg-gray-800 rounded-2xl shadow-lg border border-gray-700 flex flex-col h-[550px]">
                <div class="p-4 border-b border-gray-700 bg-gray-800/80 flex justify-between items-center rounded-t-2xl">
                    <h2 id="chatBoxTitle" class="font-semibold text-gray-200">語音對話紀錄</h2>
                    <div class="flex items-center gap-4">
                        <div id="recordingIndicator" class="hidden flex items-center gap-2">
                            <i data-lucide="activity" class="w-4 h-4 text-indigo-400 animate-pulse"></i>
                            <span class="text-xs text-indigo-400 hidden sm:inline">伺服器自動偵測語音中...</span>
                        </div>
                        <!-- 清除畫面按鈕 -->
                        <button id="clearTranscriptBtn" class="flex items-center gap-1 px-3 py-1.5 text-xs text-gray-400 hover:text-red-400 hover:bg-red-400/10 rounded-md transition-colors border border-transparent hover:border-red-400/30">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 清除畫面
                        </button>
                    </div>
                </div>
                
                <div id="transcriptContainer" class="p-6 flex-1 bg-gray-900/50 overflow-y-auto space-y-6 scroll-smooth relative whitespace-pre-wrap">
                    <!-- 歷史紀錄將插入於此 -->
                    
                    <!-- 正在講話的即時區塊 -->
                    <div id="currentSpeechContainer" class="hidden flex-col gap-2 max-w-[90%] opacity-90">
                        <!-- 原文 (使用者) 永遠在上方 -->
                        <div id="currentTranscript" class="flex flex-col gap-1 items-start">
                            <span class="text-xs text-gray-500 ml-1">您說的話 (轉錄中)：</span>
                            <div class="text-sm text-gray-300 bg-gray-800 w-fit px-4 py-2 rounded-xl rounded-bl-none border border-gray-600 border-dashed">
                                <span class="transcript-text text-gray-500 italic">(聆聽中...)</span> <span class="animate-pulse">...</span>
                            </div>
                        </div>
                        <!-- AI 回應 / 翻譯 在下方 -->
                        <div id="currentTranslation" class="flex flex-col gap-1 items-start mt-1 hidden">
                            <span id="aiLabel" class="text-xs text-indigo-400 ml-1">AI 回應：</span>
                            <div class="text-base text-indigo-100 bg-indigo-600/20 w-fit px-4 py-2.5 rounded-2xl rounded-tl-none border border-indigo-500/40 border-dashed">
                                <span class="translation-text"></span> <span class="animate-pulse font-bold text-indigo-400">_</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- 狀態與常數 ---
        const RATE_PER_MINUTE = 0.034;
        const RATE_PER_SECOND = RATE_PER_MINUTE / 60;
        let isRecording = false;
        let sessionSeconds = 0;
        let sessionCost = 0;
        let budget = 5.00;
        let transcripts = [];
        let currentTranscriptText = '';
        let currentTranslationText = '';
        let activeMode = 'assistant'; // 'assistant', 'translate', 'whisper'

        // WebRTC & WebSocket 相關變數
        let ws = null;
        let audioContext = null; 
        let micAudioContext = null; 
        let mediaStream = null;
        let processor = null;
        let timerId = null;
        
        // 播放聲音的排程時間追蹤
        let nextPlayTime = 0;
        let activeAudioNodes = [];

        // --- DOM 元素 ---
        const apiKeyInput = document.getElementById('apiKeyInput');
        const targetLanguageSelect = document.getElementById('targetLanguageSelect');
        const assistantSettings = document.getElementById('assistantSettings');
        const assistantRoleSelect = document.getElementById('assistantRoleSelect');
        const voiceSelect = document.getElementById('voiceSelect');
        const whisperNotice = document.getElementById('whisperNotice');
        
        const toggleRecordingBtn = document.getElementById('toggleRecordingBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusMessage = document.getElementById('statusMessage');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const explanationContainer = document.getElementById('explanationContainer');
        const chatBoxTitle = document.getElementById('chatBoxTitle');
        const clearTranscriptBtn = document.getElementById('clearTranscriptBtn');
        
        const sessionTimeDisplay = document.getElementById('sessionTimeDisplay');
        const sessionCostDisplay = document.getElementById('sessionCostDisplay');
        const remainingBudgetDisplay = document.getElementById('remainingBudgetDisplay');
        const budgetProgressBar = document.getElementById('budgetProgressBar');
        
        const recordingIndicator = document.getElementById('recordingIndicator');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const currentSpeechContainer = document.getElementById('currentSpeechContainer');
        const currentTranscriptEl = document.getElementById('currentTranscript');
        const currentTranslationEl = document.getElementById('currentTranslation');

        // --- 初始化解說文字 ---
        const explanations = {
            assistant: `<strong>💡 玩法解說 (GPT-Realtime-2 語音對話助理模式 + 工具調用)：</strong><br>
                        此模式下，AI 具備<strong>「原生聽說能力」</strong>，並且已經在後台連接了虛擬招生資料庫！<br>
                        <em>🔥 神奇測試建議：請選擇「招生顧問」，然後用語音問它：<span class="text-yellow-400">「幫我查一下日文科的入學門檻？」</span> 觀察它如何中斷聊天，自動去撈取資料，再用語音回報給您！</em>`,
            translate: `<strong>💡 玩法解說 (GPT-Realtime-Translate 即時翻譯模式)：</strong><br>
                        此模式關閉 AI 語音，純做文字翻譯。<br>
                        <strong>技術備註：</strong>您可能會發現翻譯在您「停頓」後才瞬間出現。這是因為 OpenAI 依賴 VAD (語音活動偵測) 來判斷您講完一句話，主打「超低延遲的停頓後翻譯」。`,
            whisper:   `<strong>💡 玩法解說 (GPT-Realtime-Whisper 即時聽寫模式)：</strong><br>
                        關閉 AI 回應與翻譯，專注於「零延遲語音轉文字」。已強制鎖定輸出必須為繁體中文。<br>
                        <em>測試建議：直接念一段新聞稿，觀察繁體中文字的準確度。</em>`
        };

        const savedApiKey = localStorage.getItem('openai_api_key');
        if (savedApiKey) { apiKeyInput.value = savedApiKey; }
        apiKeyInput.addEventListener('change', (e) => localStorage.setItem('openai_api_key', e.target.value));
        explanationContainer.innerHTML = explanations['assistant'];

        // --- 分頁切換邏輯 ---
        window.switchTab = function(mode) {
            if (isRecording) {
                showError("請先停止目前的連線，再切換模式！");
                return;
            }
            activeMode = mode;
            
            ['assistant', 'translate', 'whisper'].forEach(m => {
                const btn = document.getElementById(`tab-${m}`);
                btn.className = m === mode 
                    ? "flex-1 py-3 px-4 text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 tab-active"
                    : "flex-1 py-3 px-4 text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 tab-inactive";
            });

            targetLanguageSelect.classList.add('hidden');
            assistantSettings.classList.add('hidden');
            whisperNotice.classList.add('hidden');

            if (mode === 'translate') {
                targetLanguageSelect.classList.remove('hidden');
                chatBoxTitle.textContent = "即時雙語對話";
                document.getElementById('aiLabel').textContent = "即時翻譯：";
            } else if (mode === 'assistant') {
                assistantSettings.classList.remove('hidden');
                assistantSettings.classList.add('flex');
                chatBoxTitle.textContent = "AI 語音助理 (支援外部資料查詢)";
                document.getElementById('aiLabel').textContent = "AI 回應：";
            } else if (mode === 'whisper') {
                whisperNotice.classList.remove('hidden');
                whisperNotice.classList.add('flex');
                chatBoxTitle.textContent = "會議逐字稿 (僅轉錄)";
            }
            explanationContainer.innerHTML = explanations[mode];
        };

        // --- 清除畫面邏輯 ---
        clearTranscriptBtn.addEventListener('click', () => {
            transcripts = [];
            currentTranscriptText = '';
            currentTranslationText = '';
            updateTranscriptUI();
        });

        // --- 工具函數 ---
        function showError(msg) {
            if (msg) {
                errorMessage.textContent = msg;
                errorContainer.classList.remove('hidden');
                console.error("Application Error:", msg);
            } else {
                errorContainer.classList.add('hidden');
            }
        }

        function setStatus(msg, isError = false) {
            statusMessage.textContent = msg;
            statusIndicator.className = `w-2 h-2 rounded-full ${isError ? 'bg-red-500' : (isRecording ? 'bg-red-500 animate-pulse' : 'bg-green-500')}`;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function floatTo16BitPCM(float32Array) {
            const buffer = new ArrayBuffer(float32Array.length * 2);
            const view = new DataView(buffer);
            let offset = 0;
            for (let i = 0; i < float32Array.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buffer;
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function scrollToBottom() {
            transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
        }

        // --- 音訊播放函數 ---
        function playAudioDelta(base64Data) {
            if (!audioContext) return;
            const binaryStr = atob(base64Data);
            const len = binaryStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryStr.charCodeAt(i); }
            
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 0x7FFF;
            }
            
            const buffer = audioContext.createBuffer(1, float32Array.length, 24000);
            buffer.getChannelData(0).set(float32Array);
            
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            
            const currentTime = audioContext.currentTime;
            if (nextPlayTime < currentTime) { nextPlayTime = currentTime; }
            source.start(nextPlayTime);
            nextPlayTime += buffer.duration;
            
            activeAudioNodes.push(source);
            source.onended = () => { activeAudioNodes = activeAudioNodes.filter(n => n !== source); };
        }

        function stopAllAudio() {
            activeAudioNodes.forEach(source => { try { source.stop(); } catch(e) {} });
            activeAudioNodes = [];
            nextPlayTime = 0;
        }

        // --- 工具調用 (Function Calling) 模擬後台 ---
        function handleToolCall(callId, name, argsString) {
            console.log(`[Tool Called] Name: ${name}, Args: ${argsString}`);
            
            // 在畫面上給予使用者回饋 (顯示系統正在動作)
            currentTranslationText += `\n\n[⚙️ 系統查詢中：${name}...]\n`;
            updateTranscriptUI();

            setTimeout(() => {
                let result = { status: "success", data: "查無此科系資料" };
                try {
                    const args = JSON.parse(argsString);
                    const dept = args.department || "未知科系";
                    
                    // 模擬文藻招生資料庫
                    const db = {
                        "日文": "日文科的錄取門檻大約為 2A3B 或 1A4B。特色是全台唯二的五專日文科，並有豐富的赴日交換機會。",
                        "英文": "英文科的錄取門檻大約為 3A2B。注重全英語授課環境與國際溝通能力培養。",
                        "法文": "法文科的錄取門檻大約為 5B (含2個B+)。特色是結合歐盟文化與語言訓練。",
                        "德文": "德文科的錄取門檻大約為 5B。注重工業與商業德語應用。",
                        "西班牙文": "西班牙文科的錄取門檻大約為 5B。是中南美洲經貿人才的搖籃。"
                    };
                    
                    for (const key in db) {
                        if (dept.includes(key) || key.includes(dept)) {
                            result.data = `資料庫回傳結果：${db[key]}`;
                            break;
                        }
                    }
                } catch(e) {
                    result.status = "error";
                    result.data = e.message;
                }

                // 透過 WebSocket 將查詢結果送回給 OpenAI
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: "conversation.item.create",
                        item: {
                            type: "function_call_output",
                            call_id: callId,
                            output: JSON.stringify(result)
                        }
                    }));
                    // 要求 OpenAI 根據這份資料產生語音回覆
                    ws.send(JSON.stringify({ type: "response.create" }));
                    
                    currentTranslationText += `[✅ 資料撈取完成，AI 解讀中...]\n`;
                    updateTranscriptUI();
                }
            }, 800); // 模擬 0.8 秒的資料庫查詢延遲
        }

        // --- UI 更新邏輯 ---
        function updateBillingUI() {
            sessionTimeDisplay.textContent = formatTime(sessionSeconds);
            sessionCostDisplay.textContent = `$${sessionCost.toFixed(4)}`;
            const remainingBudget = Math.max(0, budget - sessionCost);
            remainingBudgetDisplay.textContent = `$${remainingBudget.toFixed(4)}`;
            const isLowBudget = remainingBudget < 0.5;
            const progressPercentage = Math.min(100, Math.max(0, (remainingBudget / budget) * 100));
            remainingBudgetDisplay.className = `text-sm font-mono font-bold ${isLowBudget ? 'text-red-500' : 'text-green-500'}`;
            budgetProgressBar.style.width = `${progressPercentage}%`;
            budgetProgressBar.className = `h-1.5 rounded-full transition-all duration-1000 ${isLowBudget ? 'bg-red-500' : 'bg-green-500'}`;
        }

        function updateTranscriptUI() {
            const historyElements = transcriptContainer.querySelectorAll('.history-item');
            historyElements.forEach(el => el.remove());

            transcripts.forEach((item) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item flex flex-col gap-2 max-w-[90%] mb-6';
                
                let html = `
                    <div class="flex flex-col gap-1 items-start">
                        <span class="text-xs text-gray-500 ml-1">使用者：</span>
                        <div class="text-sm text-gray-300 bg-gray-800 w-fit px-4 py-2 rounded-xl rounded-bl-none border border-gray-600">
                            ${item.original}
                        </div>
                    </div>
                `;
                
                if (item.translation && activeMode !== 'whisper') {
                    const label = activeMode === 'translate' ? '即時翻譯：' : 'AI 回應：';
                    html += `
                    <div class="flex flex-col gap-1 items-start mt-1">
                        <span class="text-xs text-indigo-400 ml-1">${label}</span>
                        <div class="text-base text-indigo-100 bg-indigo-600/20 w-fit px-4 py-2.5 rounded-2xl rounded-tl-none border border-indigo-500/40 font-medium">
                            ${item.translation}
                        </div>
                    </div>
                    `;
                }
                itemDiv.innerHTML = html;
                transcriptContainer.insertBefore(itemDiv, currentSpeechContainer);
            });

            if (isRecording || currentTranscriptText || currentTranslationText) {
                currentSpeechContainer.classList.remove('hidden');
                currentSpeechContainer.classList.add('flex');
                
                const transcriptSpan = currentTranscriptEl.querySelector('.transcript-text');
                if (currentTranscriptText) {
                    transcriptSpan.textContent = currentTranscriptText;
                    transcriptSpan.className = "transcript-text text-gray-300";
                } else {
                    transcriptSpan.textContent = "(聆聽中...)";
                    transcriptSpan.className = "transcript-text text-gray-500 italic";
                }

                if (activeMode !== 'whisper' && currentTranslationText) {
                    currentTranslationEl.classList.remove('hidden');
                    currentTranslationEl.querySelector('.translation-text').textContent = currentTranslationText;
                } else {
                    currentTranslationEl.classList.add('hidden');
                }
            } else {
                currentSpeechContainer.classList.add('hidden');
                currentSpeechContainer.classList.remove('flex');
            }
            scrollToBottom();
        }

        // --- 核心邏輯 ---
        function stopSession() {
            isRecording = false;
            stopAllAudio();

            if (processor && micAudioContext) processor.disconnect();
            if (micAudioContext) { micAudioContext.close(); micAudioContext = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            
            if (ws) {
                ws.onmessage = null; 
                ws.onerror = null;
                if(ws.readyState === WebSocket.OPEN) {
                    try { ws.send(JSON.stringify({type: "input_audio_buffer.commit"})); } catch(e) {}
                }
                ws.close();
                ws = null;
            }

            if (timerId) { clearInterval(timerId); timerId = null; }

            if(currentTranscriptText || currentTranslationText) {
                transcripts.push({
                    role: 'user', 
                    original: currentTranscriptText || '(未收到完整語音轉錄)', 
                    translation: currentTranslationText
                });
            }
            
            currentTranscriptText = '';
            currentTranslationText = '';
            
            toggleRecordingBtn.className = "w-full py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 font-bold transition-all bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg shadow-indigo-600/20";
            btnIcon.setAttribute('data-lucide', 'mic');
            btnText.textContent = '開始連線測試';
            lucide.createIcons();
            
            apiKeyInput.disabled = false;
            targetLanguageSelect.disabled = false;
            assistantRoleSelect.disabled = false;
            voiceSelect.disabled = false;
            recordingIndicator.classList.add('hidden');
            recordingIndicator.classList.remove('flex');
            
            setStatus('系統就緒');
            updateTranscriptUI();
        }

        async function startRecording() {
            try {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                
                const source = micAudioContext.createMediaStreamSource(mediaStream);
                processor = micAudioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN && isRecording) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcmData = floatTo16BitPCM(inputData);
                        const base64Audio = arrayBufferToBase64(pcmData);
                        
                        ws.send(JSON.stringify({
                            type: "input_audio_buffer.append",
                            audio: base64Audio
                        }));
                    }
                };

                source.connect(processor);
                processor.connect(micAudioContext.destination);

                isRecording = true;
                
                toggleRecordingBtn.className = "w-full py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 font-bold transition-all bg-red-500/20 text-red-500 border border-red-500 hover:bg-red-500/30";
                btnIcon.setAttribute('data-lucide', 'square');
                btnText.textContent = '停止連線';
                lucide.createIcons();
                
                apiKeyInput.disabled = true;
                targetLanguageSelect.disabled = true;
                assistantRoleSelect.disabled = true;
                voiceSelect.disabled = true;
                recordingIndicator.classList.remove('hidden');
                recordingIndicator.classList.add('flex');
                
                setStatus('錄音與即時處理中...');

                timerId = setInterval(() => {
                    sessionSeconds++;
                    sessionCost += RATE_PER_SECOND;
                    updateBillingUI();
                }, 1000);
                
                updateTranscriptUI();

            } catch (err) {
                console.error("麥克風存取錯誤:", err);
                showError("無法存取麥克風，請確保已給予權限。");
                stopSession();
            }
        }

        async function connectWebSocket() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { showError('請輸入 OpenAI API Key'); return; }

            showError('');

            try {
                setStatus('連線至 OpenAI Realtime API...');
                const url = "wss://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview";
                
                ws = new WebSocket(url, [
                    "realtime",
                    "openai-insecure-api-key." + apiKey,
                    "openai-beta.realtime-v1"
                ]);

                ws.onopen = () => {
                    setStatus('連線成功！正在寫入系統提示詞與註冊工具...');
                    
                    const zhTWConstraint = "\n\nCRITICAL INSTRUCTION: You MUST use Traditional Chinese (繁體中文, zh-TW) for all text generation, transcriptions, and responses. Never use Simplified Chinese.";

                    let sessionConfig = {
                        input_audio_format: "pcm16",
                        input_audio_transcription: { model: "whisper-1" },
                        turn_detection: {
                            type: "server_vad",
                            threshold: 0.5,
                            prefix_padding_ms: 300, 
                            silence_duration_ms: 500
                        }
                    };

                    if (activeMode === 'assistant') {
                        const role = assistantRoleSelect.value;
                        sessionConfig.modalities = ["text", "audio"];
                        sessionConfig.voice = voiceSelect.value;
                        sessionConfig.instructions = `You are a helpful and intelligent assistant. Your role is: ${role}. You must reply using audio. If the user asks about admission requirements, department information, or anything related to enrollment (例如：入學門檻、特色), YOU MUST ALWAYS use the get_admission_info tool to search for accurate data before answering.` + zhTWConstraint;
                        
                        // ✨ 註冊工具 (Tool Calling)
                        sessionConfig.tools = [{
                            type: "function",
                            name: "get_admission_info",
                            description: "獲取文藻外語大學五專部各科系的入學門檻與特色資訊",
                            parameters: {
                                type: "object",
                                properties: {
                                    department: { type: "string", description: "科系名稱，例如：英文科、法文科、德文科、西班牙文科、日文科" }
                                },
                                required: ["department"]
                            }
                        }];
                        sessionConfig.tool_choice = "auto";

                    } else if (activeMode === 'translate') {
                        const targetLangName = targetLanguageSelect.options[targetLanguageSelect.selectedIndex].text;
                        sessionConfig.modalities = ["text"];
                        sessionConfig.instructions = `You are a real-time translator. Translate whatever the user says into ${targetLangName}. Provide ONLY the translation. Do NOT reply to the user's questions, just translate.` + zhTWConstraint;
                    } else if (activeMode === 'whisper') {
                        sessionConfig.modalities = ["text"];
                        sessionConfig.instructions = `You are a dictation assistant. Listen to the user. DO NOT generate any text response.` + zhTWConstraint;
                    }

                    ws.send(JSON.stringify({
                        type: "session.update",
                        session: sessionConfig
                    }));
                };

                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);

                    switch (message.type) {
                        case 'session.updated':
                            setStatus('大腦載入完成，請開始說話...');
                            startRecording();
                            break;
                            
                        case 'conversation.item.input_audio_transcription.completed':
                            currentTranscriptText = message.transcript;
                            updateTranscriptUI();
                            if (activeMode === 'whisper') {
                                transcripts.push({
                                    role: 'user', 
                                    original: currentTranscriptText,
                                    translation: ''
                                });
                                currentTranscriptText = '';
                                updateTranscriptUI();
                            }
                            break;
                            
                        case 'response.text.delta':
                            if (activeMode === 'translate') {
                                currentTranslationText += message.delta;
                                updateTranscriptUI();
                            }
                            break;

                        case 'response.audio_transcript.delta':
                            if (activeMode === 'assistant') {
                                currentTranslationText += message.delta;
                                updateTranscriptUI();
                            }
                            break;

                        case 'response.audio.delta':
                            if (activeMode === 'assistant') {
                                playAudioDelta(message.delta);
                            }
                            break;

                        // ✨ 攔截工具呼叫事件
                        case 'response.function_call_arguments.done':
                            if (activeMode === 'assistant') {
                                handleToolCall(message.call_id, message.name, message.arguments);
                            }
                            break;

                        case 'input_audio_buffer.speech_started':
                            stopAllAudio();
                            break;

                        case 'response.done':
                            if ((currentTranscriptText || currentTranslationText) && activeMode !== 'whisper') {
                                transcripts.push({
                                    role: 'user', 
                                    original: currentTranscriptText || '(未收到完整語音轉錄)',
                                    translation: currentTranslationText
                                });
                                currentTranscriptText = '';
                                currentTranslationText = '';
                                updateTranscriptUI();
                            }
                            break;
                            
                        case 'error':
                            const errorDetail = message.error ? (message.error.message || JSON.stringify(message.error)) : JSON.stringify(message);
                            console.error("OpenAI Error:", errorDetail);
                            showError(`OpenAI 回傳錯誤: ${errorDetail}`);
                            stopSession();
                            break;
                    }
                };

                ws.onerror = (e) => {
                    showError('WebSocket 網路連線失敗，請檢查網路狀態。');
                    stopSession();
                };

                ws.onclose = () => {
                    if(isRecording) { setStatus('連線已中斷'); }
                    stopSession();
                };

            } catch (err) {
                showError(`連線設定錯誤: ${err.message}`);
                stopSession();
            }
        }

        // --- 事件監聽 ---
        toggleRecordingBtn.addEventListener('click', () => {
            if (isRecording || ws) {
                stopSession();
            } else {
                if (budget - sessionCost <= 0) {
                    showError('模擬餘額不足，請重整頁面。');
                    return;
                }
                connectWebSocket();
            }
        });
        
        updateBillingUI();
    </script>
</body>
